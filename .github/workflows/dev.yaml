name: Github Actions CI-CD
on:
  push:
    branches:
      - dev

  workflow_dispatch:
permissions:
  contents: write
  id-token: write
env:
  AWS_ACCOUNT_ID: 586639730662
  AWS_REGION: ap-northeast-2

jobs:
  build:
    runs-on: arc-runner-set


    steps:
    - name: Log in to AWS ECR
      uses: aws-actions/amazon-ecr-login@v2
      env:
        AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY}}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ env.AWS_REGION }}
    
    - uses: actions/checkout@v4
    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d-%H-%M-%S')" >> "$GITHUB_OUTPUT"
    - run: echo ${{ steps.date.outputs.date }}

    
      
    - name: CI-pre_build # 
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions"
        aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 586639730662.dkr.ecr.ap-northeast-2.amazonaws.com 
    - name: CI-build
  
      run: |
        docker build -t 586639730662.dkr.ecr.ap-northeast-2.amazonaws.com/user:${{ steps.date.outputs.date }} .
    
    - name: CI-post_build
      run: |
        docker push 586639730662.dkr.ecr.ap-northeast-2.amazonaws.com/user:${{ steps.date.outputs.date }}
        
    - name: clone
      run: |
        git checkout dev
    - name: update k8s deployment image
      run: |
        sed -i "s|image: 586639730662.dkr.ecr.ap-northeast-2.amazonaws.com/user:.*|image: 586639730662.dkr.ecr.ap-northeast-2.amazonaws.com/user:${{ steps.date.outputs.date }}|g" deploy.yaml
        git add deploy.yaml
        git commit -m "Update deployment image to ${{ steps.date.outputs.date }}"
        git push origin dev
      env: # 환경 변수
          PAT: ${{ secrets.PAT }}
