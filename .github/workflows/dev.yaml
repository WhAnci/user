name: Github Actions CI-CD
on:
  push:
    branches:
      - dev


env:
  AWS_ACCOUNT_ID: 586639730662
  ECR_REPOSITORY: user
  AWS_REGION: ap-northeast-2

jobs:
  build-and-deploy:
    permissions: write-all
    runs-on: arc-runner-set

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Log in to AWS ECR
      uses: aws-actions/amazon-ecr-login@v2
      env:
        AWS_ACCOUNT_ID: ${{ env.AWS_ACCOUNT_ID }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        AWS_REGION: ${{ env.AWS_REGION }}

    - name: Set IMAGE_TAG
      id: tag
      run: |
        echo "IMAGE_TAG=${GITHUB_SHA::7}" >> $GITHUB_ENV
        echo "IMAGE_URL=${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${GITHUB_SHA::7}" >> $GITHUB_ENV
      
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      run: |
        echo `ls -al`
      with:
        context: .
        push: true
        tags: ${{ env.IMAGE_URL }}
        
    - name: checkout
      run: |
        git checkout dev
    - name: update k8s deployment image
      run: |
        sed -i "s|image: .*|image: ${{ env.IMAGE_URL }}|g" deploy.yaml
      env:
        AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        IMAGE_URL: ${{ env.IMAGE_URL }}

    - name: Commit updated deploy.yaml
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add deploy.yaml
        git commit -m "Update image tag to $IMAGE_TAG" || echo "No changes to commits"
        git push origin dev
      env:
        GITHUB_TOKEN: ${{ secrets.PAT }}